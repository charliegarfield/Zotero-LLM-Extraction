<vbox id="llm-metadata-preferences"
      xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
      xmlns:html="http://www.w3.org/1999/xhtml">

  <groupbox>
    <label><html:h2>LLM Provider Settings</html:h2></label>

    <hbox align="center" style="margin: 4px 0;">
      <label value="LLM Provider" style="width: 160px;" />
      <menulist id="llm-metadata-provider" style="min-width: 200px;">
        <menupopup>
          <menuitem label="Anthropic (Claude)" value="anthropic" />
          <menuitem label="OpenAI" value="openai" />
          <menuitem label="OpenAI-Compatible" value="openai-compatible" />
        </menupopup>
      </menulist>
    </hbox>

    <hbox align="center" style="margin: 4px 0;">
      <label value="API Key" style="width: 160px;" />
      <html:input id="llm-metadata-apiKey"
                  type="password"
                  style="flex: 1; min-width: 300px;" />
    </hbox>

    <hbox align="center" style="margin: 4px 0;">
      <label value="Custom Endpoint" style="width: 160px;" />
      <html:input id="llm-metadata-endpoint"
                  type="text"
                  placeholder="http://localhost:11434/v1/chat/completions"
                  style="flex: 1; min-width: 300px;" />
    </hbox>

    <hbox align="center" style="margin: 4px 0;">
      <label value="Model" style="width: 160px;" />
      <html:input id="llm-metadata-model"
                  type="text"
                  style="flex: 1; min-width: 300px;" />
    </hbox>

    <hbox align="center" style="margin: 4px 0;">
      <label value="Temperature" style="width: 160px;" />
      <html:input id="llm-metadata-temperature"
                  type="number"
                  min="0" max="1" step="0.1"
                  style="width: 80px;" />
    </hbox>

    <hbox align="center" style="margin: 4px 0;">
      <label value="Max pages to extract" style="width: 160px;" />
      <html:input id="llm-metadata-maxPages"
                  type="number"
                  min="1" max="50"
                  style="width: 80px;" />
    </hbox>
  </groupbox>

  <groupbox>
    <label><html:h2>Verification</html:h2></label>

    <checkbox id="llm-metadata-verifyDOI"
              label="Auto-verify DOIs against CrossRef" />

    <checkbox id="llm-metadata-verifyISBN"
              label="Auto-verify ISBNs against Google Books" />

    <checkbox id="llm-metadata-enableOCR"
              label="Enable OCR fallback for image-only PDFs" />
  </groupbox>

  <groupbox>
    <label><html:h2>Behavior</html:h2></label>

    <hbox align="center" style="margin: 4px 0;">
      <label value="Overwrite existing fields" style="width: 160px;" />
      <menulist id="llm-metadata-overwriteMode" style="min-width: 150px;">
        <menupopup>
          <menuitem label="Never" value="never" />
          <menuitem label="Ask each time" value="ask" />
          <menuitem label="Empty fields only" value="empty" />
          <menuitem label="Always" value="always" />
        </menupopup>
      </menulist>
    </hbox>

    <checkbox id="llm-metadata-autoExtract"
              label="Auto-extract metadata when new items with PDFs are added" />
  </groupbox>

  <groupbox>
    <label><html:h2>Privacy</html:h2></label>
    <description>This plugin sends document text to the configured LLM API for metadata extraction. API keys are stored in Zotero preferences (prefs.js) and are not encrypted at rest. For maximum privacy, configure a local LLM endpoint.</description>
  </groupbox>
</vbox>
