<?xml version="1.0"?>
<?xml-stylesheet href="chrome://global/skin/" type="text/css"?>
<?xml-stylesheet href="chrome://llm-metadata/content/zoteroPane.css" type="text/css"?>

<window id="llm-metadata-review-dialog"
        xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
        xmlns:html="http://www.w3.org/1999/xhtml"
        title="LLM Metadata Review"
        width="700"
        height="600"
        persist="screenX screenY width height">

  <!-- No inline script needed — init is called from the opening code via load event -->

  <vbox flex="1" style="padding: 10px;">

    <!-- Header -->
    <hbox align="center" style="margin-bottom: 10px;">
      <label value="Review Extracted Metadata" style="font-size: 16px; font-weight: bold;" />
      <spacer flex="1" />
      <label id="review-confidence" class="confidence-badge" />
      <label id="review-batch-counter" style="margin-left: 10px;" />
    </hbox>

    <!-- Item Type Selector -->
    <hbox align="center" style="margin-bottom: 10px;">
      <label value="Item Type" style="width: 120px; font-weight: bold;" />
      <menulist id="review-item-type-selector" style="flex: 1;">
        <menupopup id="review-item-type-popup" />
      </menulist>
    </hbox>

    <!-- Metadata Fields Table -->
    <html:div id="review-fields-container" style="flex: 1; overflow-y: auto; border: 1px solid #ccc; border-radius: 4px;">
      <html:table id="review-fields-table" style="width: 100%; border-collapse: collapse;">
        <html:thead>
          <html:tr style="background: #f0f0f0; position: sticky; top: 0;">
            <html:th style="padding: 8px; text-align: left; width: 30px;">Accept</html:th>
            <html:th style="padding: 8px; text-align: left; width: 140px;">Field</html:th>
            <html:th style="padding: 8px; text-align: left;">Current Value</html:th>
            <html:th style="padding: 8px; text-align: left;">Extracted Value</html:th>
          </html:tr>
        </html:thead>
        <html:tbody id="review-fields-body" />
      </html:table>
    </html:div>

    <!-- Creators Section -->
    <groupbox id="review-creators-group" style="margin-top: 10px;">
      <label value="Creators" style="font-weight: bold;" />
      <html:div id="review-creators-container" />
      <hbox align="center">
        <checkbox id="review-accept-creators" checked="true" label="Accept extracted creators" />
      </hbox>
    </groupbox>

    <!-- Tags Section -->
    <groupbox id="review-tags-group" style="margin-top: 5px;">
      <label value="Tags" style="font-weight: bold;" />
      <html:div id="review-tags-container" />
      <hbox align="center">
        <checkbox id="review-accept-tags" checked="true" label="Accept extracted tags" />
      </hbox>
    </groupbox>

    <!-- Verification Status -->
    <hbox id="review-verification-status" align="center" style="margin-top: 5px; padding: 5px; border-radius: 4px;">
      <label id="review-verification-text" />
      <spacer flex="1" />
      <button id="review-verify-doi-btn" label="Verify DOI"
              oncommand="window.llmMetadataReview.verifyDOI()" />
    </hbox>

    <!-- Action Buttons -->
    <hbox align="center" style="margin-top: 10px;">
      <button id="review-accept-all" label="Accept All"
              oncommand="window.llmMetadataReview.acceptAll()" />
      <button id="review-accept-empty" label="Accept Empty Only"
              oncommand="window.llmMetadataReview.acceptEmptyOnly()" />
      <spacer flex="1" />
      <button id="review-prev-btn" label="Previous"
              oncommand="window.llmMetadataReview.prevItem()"
              hidden="true" />
      <button id="review-next-btn" label="Next"
              oncommand="window.llmMetadataReview.nextItem()"
              hidden="true" />
      <button id="review-accept-remaining" label="Accept All Remaining"
              oncommand="window.llmMetadataReview.acceptAllRemaining()"
              hidden="true" />
      <spacer flex="1" />
      <button id="review-apply-btn" label="Apply Selected"
              oncommand="window.llmMetadataReview.apply()" />
      <button id="review-cancel-btn" label="Cancel"
              oncommand="window.close()" />
    </hbox>
  </vbox>
</window>
